name: React on README.md Updates

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
  workflow_dispatch:
    inputs:
      files:
        description: 'Markdown files to process (space-separated). Leave empty to process all *.md files.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  react-on-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all markdown files
        id: changed-markdown-files
        if: github.event_name == 'push'
        uses: chemodun/changed-files@0.1.0
        with:
          # File names or patterns to match, separated by spaces
          # Use .*\.md to match all markdown files
          files: .*\.md

      - name: Get markdown files for manual dispatch
        id: dispatch-markdown-files
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "${{ github.event.inputs.files }}" ]]; then
            files="${{ github.event.inputs.files }}"
          else
            files=$(find . -maxdepth 2 -name "*.md" | sed 's|^\./||' | tr '\n' ' ')
          fi
          echo "all_changed_files=$files" >> $GITHUB_OUTPUT
          echo "any_changed=true" >> $GITHUB_OUTPUT

      - name: Resolve files to process
        id: files-to-process
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "files=${{ steps.dispatch-markdown-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT
            echo "any_changed=${{ steps.dispatch-markdown-files.outputs.any_changed }}" >> $GITHUB_OUTPUT
          else
            echo "files=${{ steps.changed-markdown-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT
            echo "any_changed=${{ steps.changed-markdown-files.outputs.any_changed }}" >> $GITHUB_OUTPUT
          fi

      - name: Install python3
        if: steps.files-to-process.outputs.any_changed == 'true'
        run: sudo apt-get update && sudo apt-get install -y python3

      - name: Clone markdown-to-bbcode repository
        if: steps.files-to-process.outputs.any_changed == 'true'
        run: |
          git clone https://github.com/chemodun/markdown-to-bbcode-simple.git

      - name: Process *.md changes
        if: steps.files-to-process.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.files-to-process.outputs.files }}
          DELETED_FILES: ${{ steps.changed-markdown-files.outputs.deleted_files }}
        run: |
          git config user.name "Chem O'Dun"
          git config user.email "chemodun@gmail.com"
          for file_changed in ${CHANGED_FILES}; do
            for conversion_type in egosoft nexus steam; do
              echo "Converting $file_changed to $conversion_type"
              python3 markdown-to-bbcode-simple/markdown_to_bbcode.py -t $conversion_type -o "docs" "$file_changed"
              if [[ $? -ne 0 ]]; then
                echo "Error converting $file_changed to $conversion_type" >&2
              else
                echo "Converted $file_changed to $conversion_type"
                file_converted="${file_changed%.md}.$conversion_type"
                git add "docs/$file_converted"
                if [[ $? -ne 0 ]]; then
                  echo "Error adding docs/$file_converted to git" >&2
                else
                  echo "Added docs/$file_converted to git"
                fi
              fi
            done
          done
          for file_deleted in ${DELETED_FILES}; do
            for conversion_type in egosoft nexus steam; do
              file_to_delete="docs/${file_deleted%.md}.$conversion_type"
              if [[ -f "$file_to_delete" ]]; then
                echo "Deleting $file_to_delete"
                git rm "$file_to_delete"
                if [[ $? -ne 0 ]]; then
                  echo "Error deleting $file_to_delete" >&2
                else
                  echo "Deleted $file_to_delete"
                fi
              fi
            done
          done
          rm -rf markdown-to-bbcode-simple

      - name: Commit and push changes
        if: steps.files-to-process.outputs.any_changed == 'true'
        run: |
          if [[ -n $(git status -uno --porcelain) ]]; then
            git commit -m "docs(bbcode): Update bbcode files"
            git push
            if [[ $? -ne 0 ]]; then
              echo "Error pushing changes" >&2
            else
              echo "Changes pushed successfully"
            fi
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}